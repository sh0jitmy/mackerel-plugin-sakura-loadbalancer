version: 2
project_name: mackerel-plugin-sakura-loadbalancer

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    main: ./cmd/mackerel-plugin-sakura-loadbalancer
    goos:
      - linux
    goarch:
      - amd64

archives:
  - format: zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs?:'
      - '^test:'
